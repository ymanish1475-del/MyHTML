<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>checkbox element</title>
</head>
<body>
    <form action="/server">
         <lable for="two">NAME-</lable>
        <input type="text" placeholder="enter name" id="two" name="name">
       
        <input type="checkbox" id="one" name="check">
        <lable for="one">student</lable>

        <button>submit</button>
        <button type="reset">reset</button>

        <input type="checkbox" id="" name="check" checked>
        <lable for="">checked</lable>
        <!-- by default check ke liye "checked" -->


    </form>
    
</body>
</html>
