<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ass qs 3</title>
</head>
<body>

    <form action="/action">

        <div>
            <h2>Feedback Form</h2>
        </div>
        <br>

        <div>
            <lable for="name">Name:</lable>
            <input type="text" id="name" name="name" placeholder="write your name">
        </div>
        <br>

        <div>
            <lable for="email">Email:</lable>
            <input type="text" id="email" name="email" placeholder="write your Email">
        </div>
        <br>

        <div>
            <p>Message :</p>
            <label id="ta"></label>
            <textarea id="ta"  rows="4" cols="24" name="message">Message :</textarea>
        </div>
        <br>

        <div>
            <lable for="rd">Rate us out of 5 :</lable>
            <br>
            <input type="radio" id="rd" name="rate" value="1">
            <lable for="rd">1</lable>
            <br>
            <input type="radio" id="rd" name="rate" value="2">
            <lable for="rd">2</lable>
            <br>
            <input type="radio" id="rd" name="rate" value="3">
            <lable for="rd">3</lable>
            <br>
            <input type="radio" id="rd" name="rate" value="4">
            <lable for="rd">4</lable>
            <br>
            <input type="radio" id="rd" name="rate" value="5">
            <lable for="rd">5</lable>
        </div>
        <br>

        <div>
            <button>Send your message!</button>
        </div>
        <br>

        <div>
            <button type="reset">Reset</button>
        </div>

    </form>
    <hr>
    
</body>
</html>
