<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>colspan and row span in html</title>
</head>
<body>

    <table border="black">
        <thead> 
            <!-- table header -->
        <caption>Food Menu</caption>
            
           <tr>
            <th>item</th>
            <th colspan="2">price</th>
            <th colspan="2"></th>
           </tr>
        </thead>

        <tbody>
            <!-- table body -->

           <tr>
            <td>samosa </td>
            <td>10 ₹ &#8377; </td>
            <tr></tr>
            
           </tr>

           <tr>
            <td>tea</td>
            <td>10 &#8377; </td>
            <tr></tr>
           </tr>

           <tr>
            <td>coffee</td>
            <td> 10 &#8377;</td>
            <tr></tr>
           </tr>
           
           <tr>
            <td>frooty</td>
            <td>10 &#8377; </td>
            <tr></tr>
           </tr>

           <tr>
            <td>chips</td>
            <td>10 &#8377; </td>
            <tr></tr>
           </tr>

           <tr>
            <td>maggi</td>
            <td>20 &#8377; </td>
            <tr></tr>
           </tr>

           <tr>
            <td>dosa</td>
            <td>50 &#8377; </td>
            <tr></tr>
           </tr>
        </tbody>

        <tfoot>
            <!-- table footer -->
            <tr>
                <td>count</td>
                <td>7</td>
                <tr></tr>
            </tr>
        </tfoot>
    </table>

    <table BORDER="RED">
        <caption>food menu</caption>
        <thead></thead>
        <tbody>
            <tr>
                <th rowspan="2">Item</th>
                <th colspan="2">price</th>
            </tr>
            <tr>
                
                <th>INR</th>
                <th>USD</th>
            </tr>
            <tr>
                <td>samosa</td>
                <td>10 &#8377; </td>
                <td>0.14 	&dollar;</td>
            </tr>

            <tr>
                <td>tea</td>
                <td>15 &#8377; </td>
                <td>0.21 	&dollar;</td>
            </tr>

            <tr>
                <td>chips</td>
                <td>20 &#8377; </td>
                <td>0.28 	&dollar;</td>
            </tr>
        </tbody>
    </table>
    
</body>
</html>
