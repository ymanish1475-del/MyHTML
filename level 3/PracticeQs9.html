        <div><h2>Registration Form</h2></div>

        <br>

        <div>

                <option value="Female">Female</option>

                <option value="not to prefer say">not to prefer say</option>


            </select>

            <lable for="check">Do you agree to all terms and service?</lable>

            Yes, I agree

            <button type="reset">Reset</button>
        </div>

    </form>
